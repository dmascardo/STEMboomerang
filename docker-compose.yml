services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stemboomerang-backend
    env_file:
      - .env
    environment:
      SQLITE_PATH: /app/data/candidates.db
      FRONTEND_ORIGINS: ${FRONTEND_ORIGINS:-http://localhost:5173,http://127.0.0.1:5173}
    ports:
      - "8000:8000"
    volumes:
      - db_data:/app/data
      - uploads_data:/app/uploads
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://127.0.0.1:8000}
    container_name: stemboomerang-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db_data:
  uploads_data:
